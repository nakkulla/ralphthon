services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: profile_gallery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d profile_gallery"]
      interval: 5s
      timeout: 5s
      retries: 20

  valkey:
    image: valkey/valkey:8
    ports:
      - "6379:6379"
    volumes:
      - valkeydata:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/profile_gallery
      VALKEY_URL: redis://valkey:6379/0
      IMAGE_DATA_DIR: /data/images
      MAX_IMAGE_BYTES: "5242880"
    ports:
      - "8000:8000"
    volumes:
      - imgdata:/data/images
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

volumes:
  pgdata:
  valkeydata:
  imgdata:
